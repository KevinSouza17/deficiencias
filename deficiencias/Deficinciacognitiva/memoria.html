<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória · Amigo Ajuda</title>
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            color: #1e3d58;
            font-size: 1.2rem;
        }

        .container-jogo {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        /* CABEÇALHO */
        .topo-jogo {
            background: linear-gradient(135deg, #A7E0E0, #6A4E9B);
            padding: 0.8rem 0;
            border-bottom: 8px solid #F8B042;
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: #F45D4C;
            padding: 0.3rem 2rem 0.3rem 1rem;
            border-radius: 60px 20px 60px 20px;
            border: 4px solid #FFE55C;
        }

        .icone-logo {
            font-size: 3rem;
            color: #FFE55C;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            color: white;
            text-shadow: 3px 3px 0 #057E8C;
        }

        .botao-voltar {
            background-color: #F8B042;
            color: #1e3d58;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.4rem;
            border: 4px solid #057E8C;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            transition: 0.1s;
        }

        .botao-voltar:hover {
            background-color: #FFE55C;
            border-color: #F45D4C;
            transform: scale(1.05);
        }

        /* ÁREA PRINCIPAL DO JOGO */
        .area-jogo {
            background-color: #FFE55C;
            border-radius: 80px 20px 80px 20px;
            padding: 2rem;
            margin: 2rem 0;
            border: 8px solid #6A4E9B;
            box-shadow: 15px 15px 0 #057E8C;
        }

        .instrucao {
            background-color: #A7E0E0;
            padding: 1rem 2rem;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 2rem;
            font-size: 1.6rem;
            border: 4px solid #F45D4C;
        }

        .instrucao i {
            color: #F45D4C;
            margin-right: 1rem;
        }

        /* PAINEL DO JOGO */
        .painel-jogo {
            background-color: #6A4E9B;
            padding: 2rem;
            border-radius: 80px 20px 80px 20px;
            border: 6px solid #F8B042;
            margin-bottom: 2rem;
        }

        .status-jogo {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .placar {
            background-color: #F45D4C;
            color: white;
            font-size: 2rem;
            padding: 1rem 2rem;
            border-radius: 60px;
            border: 5px solid #FFE55C;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .placar i {
            color: #FFE55C;
        }

        .mensagem {
            background-color: #057E8C;
            color: white;
            font-size: 1.8rem;
            padding: 1rem 3rem;
            border-radius: 60px;
            border: 5px solid #F8B042;
            text-align: center;
        }

        /* GRADE DE CARTAS */
        .grade-memoria {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto 2rem;
            padding: 1rem;
        }

        .carta {
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #F8B042, #F45D4C);
            border-radius: 30px 10px 30px 10px;
            border: 5px solid #1e3d58;
            box-shadow: 8px 8px 0 #057E8C;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            transition: 0.1s;
            transform-style: preserve-3d;
            position: relative;
        }

        .carta:hover:not(.encontrada) {
            transform: scale(1.03);
            border-color: #FFE55C;
            box-shadow: 10px 10px 0 #F45D4C;
        }

        .carta.virada {
            background: #A7E0E0;
            border-color: #6A4E9B;
            color: #1e3d58;
        }

        .carta.encontrada {
            background: #057E8C;
            border-color: #FFE55C;
            color: white;
            cursor: default;
            opacity: 0.8;
            box-shadow: 5px 5px 0 #F8B042;
        }

        .carta i {
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
        }

        /* BOTÕES DE AÇÃO */
        .botoes-acao {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .botao-jogo {
            background-color: #F8B042;
            color: #1e3d58;
            border: none;
            font-size: 2rem;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 700;
            border: 5px solid #057E8C;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            transition: 0.1s;
        }

        .botao-jogo:hover {
            background-color: #F45D4C;
            border-color: #FFE55C;
            color: white;
            transform: scale(1.03);
        }

        /* DICA */
        .dica {
            background-color: #057E8C;
            color: white;
            padding: 1.5rem;
            border-radius: 60px;
            text-align: center;
            font-size: 1.4rem;
            margin-top: 2rem;
            border: 4px solid #FFE55C;
        }

        .dica i {
            margin: 0 0.5rem;
        }

        /* RODAPÉ */
        .rodape-jogo {
            background: #1e3d58;
            color: white;
            padding: 2rem;
            text-align: center;
            font-size: 1.6rem;
            border-top: 12px solid #F8B042;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <!-- MENU DE ACESSIBILIDADE FLUTUANTE (FECHADO) -->
    <div class="acessibilidade-container">
        <button class="acess-toggle" id="toggleAcessibilidade" aria-label="Abrir menu de acessibilidade">
            <i class="fas fa-universal-access"></i> Acessibilidade
        </button>
        <div class="acessibilidade-menu" id="acessibilidadeMenu">
            <button class="acess-btn" id="aumentarFonte" aria-label="Aumentar fonte">
                <i class="fas fa-text-height"></i> Aumentar fonte
            </button>
            <button class="acess-btn" id="diminuirFonte" aria-label="Diminuir fonte">
                <i class="fas fa-text-height"></i> Diminuir fonte
            </button>
            <button class="acess-btn" id="altoContraste" aria-label="Alto contraste">
                <i class="fas fa-adjust"></i> Alto contraste
            </button>
        </div>
    </div>

    <header class="topo-jogo">
        <div class="container-jogo flex-between">
            <div class="logo-area">
                <i class="fas fa-puzzle-piece icone-logo"></i>
                <h1>Jogo da Memória</h1>
            </div>
            <a href="index.html" class="botao-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
        </div>
    </header>

    <main>
        <div class="container-jogo">
            <!-- ÁREA PRINCIPAL -->
            <div class="area-jogo">
                <div class="instrucao">
                    <i class="fas fa-brain"></i> Encontre os pares de figuras iguais
                </div>

                <!-- JOGO -->
                <div class="painel-jogo">
                    <!-- STATUS -->
                    <div class="status-jogo">
                        <div class="placar">
                            <i class="fas fa-star"></i>
                            <span id="paresEncontrados">0</span> / <span id="totalPares">8</span>
                        </div>
                        <div class="mensagem" id="mensagemJogo">
                            Encontre todos os pares!
                        </div>
                    </div>

                    <!-- GRADE DE CARTAS -->
                    <div class="grade-memoria" id="gradeMemoria">
                        <!-- Cartas serão inseridas via JavaScript -->
                    </div>

                    <!-- BOTÕES -->
                    <div class="botoes-acao">
                        <button class="botao-jogo" id="reiniciarJogo">
                            <i class="fas fa-redo-alt"></i> Jogar novamente
                        </button>
                    </div>
                </div>

                <!-- DICA -->
                <div class="dica">
                    <i class="fas fa-lightbulb"></i> Dica: memorize a posição das figuras. Clique em duas cartas para virar.
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-jogo">
        <p><i class="fas fa-heart" style="color:#F45D4C;"></i> Divirta-se e exercite a memória!</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // LISTA DE ÍCONES PARA O JOGO (todos da Font Awesome)
        const iconesDisponiveis = [
            'fa-smile', 'fa-heart', 'fa-star', 'fa-sun',
            'fa-moon', 'fa-cloud', 'fa-tree', 'fa-cat',
            'fa-dog', 'fa-fish', 'fa-bird', 'fa-carrot',
            'fa-apple', 'fa-cake-candles', 'fa-crown', 'fa-rocket'
        ];

        // Configuração do jogo
        const totalPares = 8; // 8 pares = 16 cartas
        let cartas = [];
        let cartasViradas = [];
        let paresEncontrados = 0;
        let bloqueado = false; // para evitar cliques durante animações

        // Elementos DOM
        const gradeMemoria = document.getElementById('gradeMemoria');
        const paresEncontradosSpan = document.getElementById('paresEncontrados');
        const totalParesSpan = document.getElementById('totalPares');
        const mensagemJogo = document.getElementById('mensagemJogo');
        const reiniciarBtn = document.getElementById('reiniciarJogo');

        // Inicializar jogo
        function iniciarJogo() {
            // Selecionar ícones aleatórios para os pares
            const iconesSelecionados = [];
            for (let i = 0; i < totalPares; i++) {
                // Escolher um ícone aleatório que ainda não foi usado
                let icone;
                do {
                    icone = iconesDisponiveis[Math.floor(Math.random() * iconesDisponiveis.length)];
                } while (iconesSelecionados.includes(icone));
                iconesSelecionados.push(icone);
            }

            // Criar pares de cartas (cada ícone aparece 2 vezes)
            cartas = [];
            iconesSelecionados.forEach((icone, index) => {
                // Par 1
                cartas.push({
                    id: index * 2,
                    icone: icone,
                    encontrada: false,
                    virada: false
                });
                // Par 2
                cartas.push({
                    id: index * 2 + 1,
                    icone: icone,
                    encontrada: false,
                    virada: false
                });
            });

            // Embaralhar cartas
            cartas = cartas.sort(() => Math.random() - 0.5);

            // Resetar variáveis
            cartasViradas = [];
            paresEncontrados = 0;
            bloqueado = false;
            
            // Atualizar placar
            paresEncontradosSpan.textContent = paresEncontrados;
            totalParesSpan.textContent = totalPares;
            mensagemJogo.textContent = 'Encontre todos os pares!';
            mensagemJogo.style.backgroundColor = '#057E8C';

            // Renderizar cartas
            renderizarCartas();
        }

        // Renderizar cartas no grid
        function renderizarCartas() {
            gradeMemoria.innerHTML = '';
            
            cartas.forEach((carta, index) => {
                const cartaDiv = document.createElement('div');
                cartaDiv.className = 'carta';
                if (carta.encontrada) {
                    cartaDiv.classList.add('encontrada');
                } else if (carta.virada) {
                    cartaDiv.classList.add('virada');
                }
                
                // Atributos para identificar a carta
                cartaDiv.dataset.index = index;
                
                // Conteúdo da carta (ícone se virada ou encontrada)
                if (carta.encontrada || carta.virada) {
                    cartaDiv.innerHTML = `<i class="fas ${carta.icone}"></i>`;
                } else {
                    cartaDiv.innerHTML = `<i class="fas fa-question"></i>`;
                }
                
                // Evento de clique
                cartaDiv.addEventListener('click', () => virarCarta(index));
                
                gradeMemoria.appendChild(cartaDiv);
            });
        }

        // Função para virar carta
        function virarCarta(index) {
            // Verificar se pode virar
            if (bloqueado) return;
            
            const carta = cartas[index];
            
            // Se já está encontrada ou já virada, não faz nada
            if (carta.encontrada || carta.virada) return;
            
            // Se já tem 2 cartas viradas, não vira mais
            if (cartasViradas.length >= 2) return;
            
            // Virar carta
            carta.virada = true;
            cartasViradas.push(index);
            
            // Atualizar visual
            renderizarCartas();
            
            // Verificar se tem 2 cartas viradas
            if (cartasViradas.length === 2) {
                verificarPar();
            }
        }

        // Verificar se as duas cartas viradas formam um par
        function verificarPar() {
            bloqueado = true;
            
            const index1 = cartasViradas[0];
            const index2 = cartasViradas[1];
            
            const carta1 = cartas[index1];
            const carta2 = cartas[index2];
            
            // Se os ícones são iguais (formam par)
            if (carta1.icone === carta2.icone) {
                // Marcar como encontradas
                carta1.encontrada = true;
                carta2.encontrada = true;
                
                // Remover das viradas
                carta1.virada = false;
                carta2.virada = false;
                
                // Incrementar contador
                paresEncontrados++;
                paresEncontradosSpan.textContent = paresEncontrados;
                
                // Limpar array de viradas
                cartasViradas = [];
                
                // Atualizar visual
                renderizarCartas();
                
                // Verificar se ganhou
                if (paresEncontrados === totalPares) {
                    mensagemJogo.textContent = '🎉 Parabéns! Você encontrou todos os pares! 🎉';
                    mensagemJogo.style.backgroundColor = '#F45D4C';
                }
                
                bloqueado = false;
            } else {
                // Não formou par, esperar um pouco e desvirar
                setTimeout(() => {
                    // Desvirar cartas
                    carta1.virada = false;
                    carta2.virada = false;
                    cartasViradas = [];
                    
                    // Atualizar visual
                    renderizarCartas();
                    
                    bloqueado = false;
                }, 800); // espera 0.8 segundos
            }
        }

        // Reiniciar jogo
        reiniciarBtn.addEventListener('click', iniciarJogo);

        // Iniciar jogo ao carregar a página
        iniciarJogo();
    </script>
</body>
</html>
