<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Música Calma · Amigo Ajuda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f0f9ff, #A7E0E0);
            color: #1e3d58;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .topo {
            background: #6A4E9B;
            padding: 1rem;
            border-bottom: 8px solid #F8B042;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #F45D4C;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            border: 4px solid #FFE55C;
        }
        .logo-area h1 { color: white; font-size: 1.8rem; }
        .botao-voltar {
            background: #F8B042;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            color: #1e3d58;
            font-weight: bold;
            border: 4px solid #057E8C;
        }
        .player {
            background: #FFE55C;
            border-radius: 60px;
            padding: 2rem;
            margin: 2rem 0;
            border: 6px solid #6A4E9B;
            text-align: center;
        }
        .capa {
            background: #057E8C;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #F8B042;
        }
        .capa i { font-size: 5rem; color: #FFE55C; }
        .controles button {
            background: #F45D4C;
            border: none;
            font-size: 2rem;
            padding: 0.8rem 1.5rem;
            margin: 0.5rem;
            border-radius: 50px;
            cursor: pointer;
            color: white;
        }
        .lista-musicas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .musica-item {
            background: #A7E0E0;
            padding: 1rem;
            border-radius: 40px;
            cursor: pointer;
            text-align: left;
            border: 3px solid #057E8C;
        }
        .musica-item:hover { background: #F8B042; }
        .musica-item.ativa { background: #F45D4C; color: white; }
        footer {
            background: #1e3d58;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        input[type=range] { width: 200px; margin: 1rem; }
    </style>
</head>
<body>
    <header class="topo">
        <div class="logo-area">
            <i class="fas fa-headphones" style="font-size: 2rem;"></i>
            <h1>Música Calma</h1>
        </div>
        <a href="index.html" class="botao-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
    </header>
    
    <div class="container">
        <div class="player">
            <div class="capa">
                <i class="fas fa-music"></i>
            </div>
            <h2 id="musicaAtual">Nenhuma música selecionada</h2>
            
            <div class="controles">
                <button id="playBtn"><i class="fas fa-play"></i> Play</button>
                <button id="pauseBtn"><i class="fas fa-pause"></i> Pause</button>
                <button id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
            </div>
            
            <div>
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volumeControl" min="0" max="100" value="50">
                <span id="volumeValue">50%</span>
            </div>
        </div>
        
        <h3><i class="fas fa-list"></i> Escolha sua música:</h3>
        <div class="lista-musicas" id="listaMusicas"></div>
        
        <div style="background: #F45D4C; padding: 1rem; border-radius: 40px; margin-top: 1rem; text-align: center; color: white;">
            <i class="fas fa-folder-open"></i> esperamos que essas músicas tragam calma e alegria para o seu dia! <br>
            <br>
        </div>
    </div>
    
    <script>
        // Lista de músicas - OS ÁUDIOS DEVEM ESTAR NA PASTA "audios"
        const musicas = [
            { nome: "Ondas do Mar", arquivo: "audios/musica1.mp3", icone: "fa-water" },
            { nome: "Chuva Suave", arquivo: "audios/musica2.mp3", icone: "fa-cloud-rain" },
            { nome: "Floresta Tranquila", arquivo: "audios/musica3.mp3", icone: "fa-tree" },
            { nome: "Piano Relaxante", arquivo: "audios/musica4.mp3", icone: "fa-piano" },
            { nome: "Vento Suave", arquivo: "audios/musica5.mp3", icone: "fa-wind" },
            { nome: "Meditação", arquivo: "audios/musica6.mp3", icone: "fa-om" }
        ];
        
        let audio = new Audio();
        let musicaAtualIndex = -1;
        
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const volumeControl = document.getElementById('volumeControl');
        const volumeValue = document.getElementById('volumeValue');
        const musicaAtualSpan = document.getElementById('musicaAtual');
        const listaDiv = document.getElementById('listaMusicas');
        
        // Renderizar lista
        musicas.forEach((musica, index) => {
            const div = document.createElement('div');
            div.className = 'musica-item';
            div.innerHTML = `<i class="fas ${musica.icone}"></i> ${musica.nome}`;
            div.onclick = () => tocarMusica(index);
            listaDiv.appendChild(div);
        });
        
        function tocarMusica(index) {
            musicaAtualIndex = index;
            const musica = musicas[index];
            audio.src = musica.arquivo;
            audio.load();
            audio.play().catch(e => {
                console.log("Erro ao tocar:", e);
                musicaAtualSpan.innerHTML = `⚠️ Áudio não encontrado: ${musica.arquivo}`;
            });
            musicaAtualSpan.innerHTML = `🎵 Tocando: ${musica.nome}`;
            
            // Destacar item ativo
            document.querySelectorAll('.musica-item').forEach((item, i) => {
                if (i === index) item.classList.add('ativa');
                else item.classList.remove('ativa');
            });
        }
        
        playBtn.onclick = () => { audio.play(); };
        pauseBtn.onclick = () => { audio.pause(); };
        stopBtn.onclick = () => { audio.pause(); audio.currentTime = 0; };
        
        volumeControl.oninput = (e) => {
            const vol = e.target.value / 100;
            audio.volume = vol;
            volumeValue.innerText = e.target.value + '%';
        };
        
        audio.onended = () => {
            musicaAtualSpan.innerHTML = "Música terminada";
        };
    </script>
    
    <footer>
        <p>🎵 Música calma para relaxar e se sentir bem</p>
    </footer>
</body>
</html>
