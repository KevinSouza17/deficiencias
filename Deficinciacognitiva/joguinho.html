<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorando Emoções · Amigo Ajuda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f0f9ff, #F8B042);
            color: #1e3d58;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .topo {
            background: #057E8C;
            padding: 1rem;
            border-bottom: 8px solid #F45D4C;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #F8B042;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            border: 4px solid #FFE55C;
        }
        .logo-area h1 { color: #1e3d58; font-size: 1.8rem; }
        .botao-voltar {
            background: #F45D4C;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: 4px solid #FFE55C;
        }
        .jogo-area {
            background: #FFE55C;
            border-radius: 60px;
            padding: 2rem;
            margin: 2rem 0;
            border: 6px solid #6A4E9B;
            text-align: center;
        }
        .situacao {
            font-size: 2rem;
            background: #A7E0E0;
            padding: 2rem;
            border-radius: 50px;
            margin: 1rem 0;
            font-weight: 600;
        }
        .opcoes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        .opcao {
            background: #F45D4C;
            color: white;
            padding: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.2s;
            border: 3px solid #FFE55C;
        }
        .opcao:hover { 
            transform: scale(1.05); 
            background: #6A4E9B;
        }
        .opcao.desabilitado { 
            opacity: 0.6; 
            cursor: default; 
            pointer-events: none; 
        }
        .contador {
            font-size: 1.5rem;
            background: #057E8C;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .mensagem-reflexao {
            margin-top: 1rem;
            padding: 1.5rem;
            border-radius: 50px;
            font-size: 1.3rem;
            background: #6A4E9B;
            color: white;
            text-align: center;
        }
        .controle-botoes {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        button {
            background: #6A4E9B;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #F45D4C; transform: scale(1.05); }
        .resultado-final {
            background: #057E8C;
            color: white;
            padding: 2rem;
            border-radius: 50px;
            margin-top: 1rem;
        }
        footer {
            background: #1e3d58;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        @media (max-width: 600px) {
            .opcoes { grid-template-columns: 1fr; }
            .situacao { font-size: 1.5rem; padding: 1rem; }
            .opcao { font-size: 1.2rem; padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- MENU DE ACESSIBILIDADE FLUTUANTE (FECHADO) -->
    <div class="acessibilidade-container">
        <button class="acess-toggle" id="toggleAcessibilidade" aria-label="Abrir menu de acessibilidade">
            <i class="fas fa-universal-access"></i> Acessibilidade
        </button>
        <div class="acessibilidade-menu" id="acessibilidadeMenu">
            <button class="acess-btn" id="talkback" aria-label="Ativar leitura em voz alta" aria-pressed="false">
                <i class="fas fa-volume-up"></i> <span id="talkbackLabel">Ligar voz</span>
            </button>
            <button class="acess-btn" id="aumentarFonte" aria-label="Aumentar fonte">
                <i class="fas fa-text-height"></i> Aumentar fonte
            </button>
            <button class="acess-btn" id="diminuirFonte" aria-label="Diminuir fonte">
                <i class="fas fa-text-height"></i> Diminuir fonte
            </button>
            <button class="acess-btn" id="altoContraste" aria-label="Alto contraste">
                <i class="fas fa-adjust"></i> Alto contraste
            </button>
        </div>
    </div>

    <header class="topo">
        <div class="logo-area">
            <i class="fas fa-smile" style="font-size: 2rem;"></i>
            <h1>Explorando Emoções</h1>
        </div>
        <a href="index.html" class="botao-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
    </header>
    
    <div class="container">
        <div class="jogo-area">
            <h2><i class="fas fa-heart"></i> Como você se sentiria?</h2>
            <p style="margin-bottom: 1rem;">Não tem resposta certa ou errada! Escolha o que faz sentido para você.</p>
            
            <div class="contador" id="contador">Situação <span id="situacaoAtual">1</span> de <span id="totalSituacoes">0</span></div>
            
            <div class="situacao" id="situacao">Carregando...</div>
            
            <div class="opcoes" id="opcoes"></div>
            
            <div class="mensagem-reflexao" id="mensagemReflexao">
                <i class="fas fa-lightbulb"></i> Clique em uma opção para refletir sobre ela
            </div>
            
            <div class="controle-botoes">
                <button id="proximoBtn" style="display: none;">✨ Próxima situação ✨</button>
                <button id="reiniciarBtn" style="display: none;">🔄 Recomeçar</button>
            </div>
        </div>
    </div>
    
    <script>
        // Situações variadas para explorar emoções (sem certo ou errado)
        const situacoes = [
            {
                texto: "Você ganhou um presente surpresa!",
                opcoes: ["Fico feliz 😊", "Fico surpreso 🤩", "Fico emocionado 🥹", "Fico animado 🎉"],
                reflexoes: [
                    "Que legal! Receber presente é sempre especial.",
                    "Surpresas boas são muito gostosas, né?",
                    "É bom se sentir especial quando alguém lembra da gente.",
                    "Animação é uma emoção maravilhosa!"
                ]
            },
            {
                texto: "Um amigo vai embora para outra cidade.",
                opcoes: ["Fico triste 😢", "Fico com saudade 💭", "Fico preocupado 😟", "Fico feliz por ele 🥰"],
                reflexoes: [
                    "Tristeza faz parte quando nos despedimos de quem amamos.",
                    "Saudade mostra o quanto a pessoa é importante para nós.",
                    "É normal se preocupar com quem a gente gosta.",
                    "Ficar feliz pela conquista do amigo também é um gesto de amor."
                ]
            },
            {
                texto: "Alguém quebrou seu brinquedo favorito.",
                opcoes: ["Fico bravo 😠", "Fico triste 😢", "Fico frustrado 😤", "Fico calmo e respiro fundo 😌"],
                reflexoes: [
                    "Raiva é uma emoção que aparece quando algo que gostamos é danificado.",
                    "Tristeza também é natural quando perdemos algo especial.",
                    "Frustração é sentir que algo não saiu como esperávamos.",
                    "Respirar fundo ajuda a lidar com momentos difíceis."
                ]
            },
            {
                texto: "Você vai andar de balanço no parque!",
                opcoes: ["Fico animado 🤩", "Fico feliz 😊", "Fico empolgado 🎢", "Fico calmo 😌"],
                reflexoes: [
                    "Animação é uma energia boa para aproveitar a diversão!",
                    "Alegria faz bem para o coração.",
                    "Empolgação é aquele friozinho gostoso na barriga.",
                    "É bom também sentir calma e aproveitar o momento."
                ]
            },
            {
                texto: "Está escuro e você não consegue ver nada.",
                opcoes: ["Fico com medo 😨", "Fico curioso 🤔", "Fico calmo 😌", "Peço ajuda 🙏"],
                reflexoes: [
                    "Medo é uma emoção que nos protege do desconhecido.",
                    "Curiosidade pode transformar o escuro em uma aventura!",
                    "Ficar calmo ajuda a pensar no que fazer.",
                    "Pedir ajuda é sempre uma ótima escolha."
                ]
            },
            {
                texto: "Você encontrou um animalzinho perdido.",
                opcoes: ["Fico preocupado 😟", "Fico com vontade de ajudar 🤗", "Fico feliz 😊", "Fico com medo 😨"],
                reflexoes: [
                    "Preocupação mostra que você se importa com os outros.",
                    "Ajudar quem precisa é um gesto lindo!",
                    "Felicidade por encontrar um novo amiguinho é especial.",
                    "É normal sentir um pouco de medo de animais desconhecidos."
                ]
            },
            {
                texto: "Seu time favorito venceu o jogo!",
                opcoes: ["Fico feliz 😊", "Comemoro muito 🎉", "Fico emocionado 🥹", "Fico orgulhoso 🏆"],
                reflexoes: [
                    "Alegria contagiante é maravilhosa!",
                    "Comemorar é uma forma de expressar a felicidade.",
                    "Emoção mostra o quanto você se importa.",
                    "Orgulho pelo time é uma sensação boa."
                ]
            },
            {
                texto: "Você caiu e se machucou um pouco.",
                opcoes: ["Fico triste 😢", "Fico com raiva 😠", "Peço ajuda 🆘", "Respiro fundo e vou me cuidar 🩹"],
                reflexoes: [
                    "Tristeza é natural quando sentimos dor.",
                    "Raiva pode aparecer, mas depois passa.",
                    "Pedir ajuda mostra que você é forte!",
                    "Cuidar de si mesmo é um ato de amor próprio."
                ]
            },
            {
                texto: "Você vai viajar para um lugar que nunca foi.",
                opcoes: ["Fico animado 🤩", "Fico com um pouco de medo 😨", "Fico curioso 🤔", "Fico tranquilo 😌"],
                reflexoes: [
                    "Animação para conhecer coisas novas é incrível!",
                    "Um pouquinho de medo do desconhecido é normal.",
                    "Curiosidade nos ajuda a aprender coisas novas.",
                    "Tranquilidade é ótima para aproveitar a viagem."
                ]
            },
            {
                texto: "Alguém te ajudou quando você mais precisou.",
                opcoes: ["Fico grato 🙏", "Fico feliz 😊", "Fico emocionado 🥹", "Quero ajudar também 🤝"],
                reflexoes: [
                    "Gratidão é um sentimento lindo de cultivar.",
                    "Alegria por ter recebido ajuda aquece o coração.",
                    "Emoção mostra o quanto aquilo foi importante.",
                    "Ajudar os outros também é uma forma de agradecer."
                ]
            },
            {
                texto: "Você perdeu seu celular ou algo importante.",
                opcoes: ["Fico preocupado 😟", "Fico nervoso 😰", "Respiro e procuro com calma 🔍", "Peço ajuda para encontrar 🆘"],
                reflexoes: [
                    "Preocupação mostra o quanto aquilo é valioso para você.",
                    "Ficar nervoso é normal em situações assim.",
                    "Respirar fundo ajuda a pensar com mais clareza.",
                    "Pedir ajuda pode tornar a busca mais fácil."
                ]
            },
            {
                texto: "Você vai fazer uma prova importante.",
                opcoes: ["Fico nervoso 😰", "Fico confiante 💪", "Estudei e estou preparado 📚", "Respiro fundo e vou com calma 😌"],
                reflexoes: [
                    "Nervosismo mostra que você se importa com o resultado.",
                    "Confiança vem do seu esforço e preparo.",
                    "Estudar é uma forma de se sentir mais seguro.",
                    "Respirar fundo ajuda a manter a calma."
                ]
            },
            {
                texto: "Você fez um novo amigo!",
                opcoes: ["Fico feliz 😊", "Fico animado 🤩", "Fico curioso para conhecer mais 🤔", "Fico tímido 😊"],
                reflexoes: [
                    "Fazer amigos é uma das coisas mais gostosas da vida!",
                    "Animação por novas amizades é contagiante.",
                    "Curiosidade ajuda a conhecer melhor a nova pessoa.",
                    "Timidez é normal e vai passando aos poucos."
                ]
            },
            {
                texto: "Está muito calor e você está com sede.",
                opcoes: ["Fico desconfortável 🥵", "Vou beber água 💧", "Procuro um lugar fresco 🏖️", "Fico com paciência 😌"],
                reflexoes: [
                    "Desconforto nos mostra o que nosso corpo precisa.",
                    "Beber água é cuidar de si mesmo!",
                    "Procurar um lugar fresco é uma boa ideia.",
                    "Paciência ajuda a lidar com situações desconfortáveis."
                ]
            },
            {
                texto: "Você ouviu sua música favorita no rádio!",
                opcoes: ["Fico feliz 😊", "Começo a cantar 🎤", "Fico animado 🤩", "Fico nostálgico 💭"],
                reflexoes: [
                    "Música tem o poder de alegrar o dia!",
                    "Cantar é uma forma linda de expressar alegria.",
                    "Animação pela música que amamos é maravilhosa.",
                    "Músicas podem trazer boas lembranças."
                ]
            },
            {
                texto: "Alguém te elogiou por algo que você fez.",
                opcoes: ["Fico feliz 😊", "Fico orgulhoso 🏆", "Fico tímido 😊", "Agradeço 🙏"],
                reflexoes: [
                    "Receber elogios é muito bom, né?",
                    "Orgulho de si mesmo é importante para a autoestima.",
                    "Timidez mostra humildade, é uma característica bonita.",
                    "Agradecer é uma forma de reconhecer quem te elogiou."
                ]
            },
            {
                texto: "Você acordou e está um lindo dia ensolarado!",
                opcoes: ["Fico animado ☀️", "Fico feliz 😊", "Quero sair para brincar 🌳", "Aproveito o dia 🌈"],
                reflexoes: [
                    "Dia bonito dá vontade de aproveitar, né?",
                    "Alegria contagia tudo ao redor.",
                    "Brincar ao ar livre faz muito bem!",
                    "Aproveitar o momento é uma forma de viver bem."
                ]
            },
            {
                texto: "Você viu um arco-íris no céu!",
                opcoes: ["Fico maravilhado 😍", "Fico feliz 😊", "Tiro foto para guardar 📸", "Admiro a natureza 🌈"],
                reflexoes: [
                    "Arco-íris traz uma sensação de encantamento!",
                    "Alegria diante da beleza é algo especial.",
                    "Guardar momentos bonitos nos faz bem.",
                    "Admirar a natureza nos conecta com o mundo."
                ]
            },
            {
                texto: "Seu pet fez alguma bagunça em casa.",
                opcoes: ["Fico irritado 😤", "Fico paciente 😌", "Limpo com calma 🧹", "Dou um carinho mesmo assim 🐾"],
                reflexoes: [
                    "Irritação é natural, mas respire fundo!",
                    "Paciência ajuda a resolver as coisas com calma.",
                    "Limpar com calma faz o trabalho ficar mais leve.",
                    "O amor pelo pet continua mesmo com bagunça."
                ]
            },
            {
                texto: "Você vai comer sua comida favorita!",
                opcoes: ["Fico animado 🤤", "Fico feliz 😊", "Aproveito cada pedacinho 😋", "Fico com vontade de comer 🍽️"],
                reflexoes: [
                    "Comida favorita é sempre motivo de alegria!",
                    "Aproveitar a refeição é um momento de prazer.",
                    "Comer devagar ajuda a aproveitar melhor.",
                    "Vontade de comer mostra que você está vivo e feliz!"
                ]
            }
        ];
        
        let situacoesDoJogo = [];
        let situacaoAtual = 0;
        let jogoAtivo = true;
        
        const situacaoEl = document.getElementById('situacao');
        const opcoesEl = document.getElementById('opcoes');
        const contadorAtualEl = document.getElementById('situacaoAtual');
        const totalSituacoesEl = document.getElementById('totalSituacoes');
        const mensagemReflexaoEl = document.getElementById('mensagemReflexao');
        const proximoBtn = document.getElementById('proximoBtn');
        const reiniciarBtn = document.getElementById('reiniciarBtn');
        
        // Embaralhar array
        function embaralharArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // Selecionar situações aleatórias (10 situações diferentes)
        function selecionarSituacoes() {
            const situacoesEmbaralhadas = embaralharArray([...situacoes]);
            return situacoesEmbaralhadas.slice(0, 10);
        }
        
        // Iniciar novo jogo
        function iniciarJogo() {
            situacoesDoJogo = selecionarSituacoes();
            situacaoAtual = 0;
            jogoAtivo = true;
            
            totalSituacoesEl.textContent = situacoesDoJogo.length;
            contadorAtualEl.textContent = '1';
            carregarSituacao();
            proximoBtn.style.display = "none";
            reiniciarBtn.style.display = "none";
            mensagemReflexaoEl.innerHTML = '<i class="fas fa-lightbulb"></i> Clique em uma opção para refletir sobre ela';
            mensagemReflexaoEl.style.background = "#6A4E9B";
        }
        
        function carregarSituacao() {
            if (situacaoAtual >= situacoesDoJogo.length) {
                finalizarJogo();
                return;
            }
            
            const s = situacoesDoJogo[situacaoAtual];
            situacaoEl.innerHTML = s.texto;
            contadorAtualEl.textContent = situacaoAtual + 1;
            
            opcoesEl.innerHTML = "";
            s.opcoes.forEach((opcao, index) => {
                const div = document.createElement('div');
                div.className = 'opcao';
                div.innerHTML = opcao;
                div.onclick = () => mostrarReflexao(index);
                opcoesEl.appendChild(div);
            });
            
            mensagemReflexaoEl.innerHTML = '<i class="fas fa-lightbulb"></i> Escolha uma opção que faz sentido para você';
        }
        
        function mostrarReflexao(respostaIndex) {
            if (!jogoAtivo) return;
            
            const s = situacoesDoJogo[situacaoAtual];
            const reflexao = s.reflexoes[respostaIndex];
            const opcaoEscolhida = s.opcoes[respostaIndex];
            
            mensagemReflexaoEl.innerHTML = `
                <i class="fas fa-comment-dots"></i> 
                <strong>Você escolheu: ${opcaoEscolhida}</strong><br>
                ${reflexao}<br><br>
                <i class="fas fa-heart"></i> Todas as emoções são válidas!
            `;
            mensagemReflexaoEl.style.background = "#057E8C";
            
            // Desabilitar cliques nas opções
            document.querySelectorAll('.opcao').forEach(op => {
                op.classList.add('desabilitado');
            });
            
            // Mostrar botão próximo
            proximoBtn.style.display = "inline-block";
        }
        
        function proximaSituacao() {
            if (!jogoAtivo) return;
            
            situacaoAtual++;
            
            if (situacaoAtual < situacoesDoJogo.length) {
                carregarSituacao();
                proximoBtn.style.display = "none";
            } else {
                finalizarJogo();
            }
        }
        
        function finalizarJogo() {
            jogoAtivo = false;
            
            opcoesEl.innerHTML = `
                <div class="resultado-final">
                    <i class="fas fa-heart" style="font-size: 3rem;"></i>
                    <h3>✨ Parabéns! ✨</h3>
                    <p>Você explorou ${situacoesDoJogo.length} situações diferentes!</p>
                    <p style="margin-top: 1rem;">Lembre-se: não existem emoções certas ou erradas.</p>
                    <p>Todas as emoções são importantes e nos ajudam a entender o que estamos sentindo.</p>
                    <p style="margin-top: 1rem;"><strong>💙 Você é único e suas emoções são válidas!</strong></p>
                </div>
            `;
            situacaoEl.innerHTML = "🌻 Você completou a jornada! 🌻";
            mensagemReflexaoEl.innerHTML = '<i class="fas fa-star"></i> Que tal explorar novamente? Você pode encontrar novas situações!';
            mensagemReflexaoEl.style.background = "#6A4E9B";
            proximoBtn.style.display = "none";
            reiniciarBtn.style.display = "inline-block";
        }
        
        proximoBtn.onclick = proximaSituacao;
        reiniciarBtn.onclick = () => {
            iniciarJogo();
        };
        
        // Iniciar jogo
        iniciarJogo();
    </script>
    
    <footer>
        <p>💙 Todas as emoções são válidas! O importante é aprender a reconhecê-las e expressá-las.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
